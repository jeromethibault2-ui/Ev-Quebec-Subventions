<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Subventions VÉ Québec</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50 text-gray-900">

  <!-- HEADER -->
<header class="bg-[#1E1E1E] text-white py-6 border-b border-[#00FF66]">
  <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <img src="logo-evqc.png" alt="EVQC Subventions" class="h-10 w-auto">
      <h1 class="text-2xl font-semibold">EVQC Subventions</h1>
    </div>
    <nav class="space-x-6 text-lg">
      <a href="index.html" class="hover:text-[#00FF66]">Accueil</a>
      <a href="subventions.html" class="hover:text-[#00FF66]">Subventions</a>
      <a href="bornes.html" class="hover:text-[#00FF66]">Bornes</a>
      <a href="electriciens.html" class="hover:text-[#00FF66]">Électriciens</a>
      <a href="faq.html" class="hover:text-[#00FF66]">FAQ</a>
      <a href="contact.html" class="hover:text-[#00FF66]">Contact</a>
    </nav>
  </div>
</header>


  <!-- HERO -->
  <section class="bg-white py-16 border-b">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <h2 class="text-4xl font-bold text-[#003DA5]">Contact et admissibilité</h2>
      <p class="mt-4 text-xl text-gray-700">
        Vérifiez votre admissibilité aux subventions ou obtenez une soumission d’un électricien certifié.
      </p>
    </div>
  </section>

  <!-- FORMULAIRE -->
  <section class="py-16">
    <div class="max-w-3xl mx-auto px-4 bg-white p-8 rounded-lg shadow">

      <h3 class="text-2xl font-bold text-[#003DA5] mb-6">Formulaire de contact</h3>

      <form class="space-y-6">

        <div>
          <label class="block text-gray-700 font-medium">Nom complet</label>
          <input type="text" class="w-full mt-2 p-3 border rounded-lg" placeholder="Votre nom" />
        </div>

        <div>
          <label class="block text-gray-700 font-medium">Adresse courriel</label>
          <input type="email" class="w-full mt-2 p-3 border rounded-lg" placeholder="exemple@email.com" />
        </div>

        <div>
          <label class="block text-gray-700 font-medium">Municipalité</label>
          <input type="text" class="w-full mt-2 p-3 border rounded-lg" placeholder="Votre ville" />
        </div>

        <div>
          <label class="block text-gray-700 font-medium">Avez-vous déjà une borne ?</label>
          <select class="w-full mt-2 p-3 border rounded-lg">
            <option>Non</option>
            <option>Oui, déjà installée</option>
            <option>Oui, mais pas encore installée</option>
          </select>
        </div>

        <div>
          <label class="block text-gray-700 font-medium">Message</label>
          <textarea class="w-full mt-2 p-3 border rounded-lg" rows="5" placeholder="Votre question ou demande"></textarea>
        </div>

        <button type="submit"
                class="w-full bg-[#003DA5] text-white py-4 rounded-lg text-lg font-semibold shadow hover:bg-blue-800">
          Envoyer ma demande
        </button>

      </form>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-[#003DA5] text-white py-6 mt-16">
    <div class="max-w-5xl mx-auto px-4 text-center">
      © 2026 Subventions VÉ Québec — Tous droits réservés.
    </div>
  </footer>

</body>
</html>
